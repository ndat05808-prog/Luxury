<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Explore LuxeFund Community events - workshops on authenticity, swap days, styling tips, and charity initiatives. Connect with our luxury fashion community."
    />
    <meta
      name="keywords"
      content="events, workshops, swap, community activities, fashion"
    />
    <meta name="author" content="LuxeFund Community" />
    <meta name="theme-color" content="#080e1a" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Events &bull; LuxeFund Community" />
    <meta
      property="og:description"
      content="Join LuxeFund Community events and workshops."
    />
    <meta property="og:url" content="https://luxefund.community/events.html" />
    <meta name="robots" content="index, follow" />
    <title>Events &bull; LuxeFund Community</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="canonical" href="https://luxefund.community/events.html" />
  </head>
  <body>
    <a class="skiplink" href="#main">Skip to content</a>

    <header class="siteheader">
      <div class="container">
        <div class="headerrow">
          <a
            class="brand"
            href="index.html"
            aria-label="LuxeFund Community - Home"
          >
            <div class="brandbadge" aria-hidden="true"></div>
            <div class="brandname">
              <strong>LuxeFund Community</strong>
              <span>Luxury lovers &bull; Fundraising</span>
            </div>
          </a>

          <div class="navwrap">
            <a
              class="btn ghost"
              href="shop.html"
              aria-label="Open fundraising shop"
            >
              Cart
              <span id="cartcount" class="badge" aria-label="Items in cart"
                >0</span
              >
            </a>

            <button
              id="themetoggle"
              class="btn ghost"
              type="button"
              aria-pressed="false"
            >
              Light mode
            </button>

            <button
              id="authtrigger"
              class="btn ghost"
              type="button"
              aria-haspopup="dialog"
            >
              Login / Register
            </button>

            <button
              id="navtoggle"
              class="navtoggle"
              type="button"
              aria-controls="nav"
              aria-expanded="false"
            >
              Menu
            </button>
          </div>
        </div>

        <nav id="nav" class="nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="shop.html">Fundraising Shop</a>
          <a href="fundraising.html">Donate</a>
          <a href="events.html">Events</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      <section class="section" aria-label="Events">
        <div class="sectionhead">
          <h2>Events</h2>
          <p>Simple filters + &ldquo;Interested&rdquo; button.</p>
        </div>

        <div class="formrow mt12" aria-label="Event filters">
          <div class="field">
            <label for="etype">Event type</label>
            <select id="etype">
              <option value="all">All</option>
              <option value="workshop">Workshop</option>
              <option value="swap">Swap</option>
              <option value="online">Online</option>
              <option value="charity">Charity</option>
            </select>
          </div>

          <div class="field">
            <label for="esearch">Search</label>
            <input
              id="esearch"
              type="search"
              placeholder="Try: styling, swap, care..."
            />
          </div>

          <div class="field">
            <label for="eSort">Sort</label>
            <select id="eSort">
              <option value="date_asc">Date: Asc</option>
              <option value="date_desc">Date: Desc</option>
            </select>
          </div>
        </div>

        <hr class="sep" />

        <div id="eventlist" class="cardgrid" aria-label="Event list"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footerbottom">
          <span class="muted">&copy; 2026 LuxeFund Community</span>
          <span class="muted">Events page</span>
        </div>
      </div>
    </footer>

    <div
      id="toastwrap"
      class="toastwrap"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <div
      id="authmodal"
      class="modalbackdrop authmodalbackdrop"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-label="Login or register"
    >
      <div class="modal authmodal">
        <div class="modalheader">
          <h3 id="authmodaltitle">Welcome back</h3>
          <button
            id="authclose"
            class="modalclose"
            type="button"
            aria-label="Close authentication"
          >
            Close
          </button>
        </div>

        <div class="authtabs" role="tablist" aria-label="Authentication tabs">
          <button
            id="authtablogin"
            class="btn primary"
            type="button"
            role="tab"
            aria-selected="true"
          >
            Login
          </button>
          <button
            id="authtabregister"
            class="btn"
            type="button"
            role="tab"
            aria-selected="false"
          >
            Register
          </button>
        </div>

        <div class="authbody">
          <div
            id="authloggedin"
            class="authpanel authloggedin hidden"
            aria-live="polite"
          >
            <p class="muted mb8">You are logged in as</p>
            <h4 id="authwhoami" class="cardtitle mt0">&mdash;</h4>
            <p id="authwhoemail" class="cardmeta">&mdash;</p>
            <div class="herocta mt12">
              <button id="authlogout" class="btn primary" type="button">
                Log out
              </button>
            </div>
          </div>

          <form id="authloginform" class="authpanel" novalidate>
            <div class="field">
              <label for="loginemail">Email</label>
              <input
                id="loginemail"
                type="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="field mt12">
              <label for="loginpassword">Password</label>
              <input
                id="loginpassword"
                type="password"
                placeholder="Minimum 6 characters"
                required
              />
            </div>

            <p class="help mt8">This is a front-end demo using localStorage.</p>

            <div class="herocta mt12">
              <button class="btn primary" type="submit">Login</button>
            </div>
          </form>

          <form id="authregisterform" class="authpanel hidden" novalidate>
            <div class="field">
              <label for="registername">Full name</label>
              <input
                id="registername"
                type="text"
                placeholder="e.g., Alex Nguyen"
                required
              />
            </div>

            <div class="field mt12">
              <label for="registeremail">Email</label>
              <input
                id="registeremail"
                type="email"
                placeholder="alex@example.com"
                required
              />
            </div>

            <div class="field mt12">
              <label for="registerpassword">Password</label>
              <input
                id="registerpassword"
                type="password"
                placeholder="Minimum 6 characters"
                required
              />
            </div>

            <div class="field mt12">
              <label for="registerconfirm">Confirm password</label>
              <input
                id="registerconfirm"
                type="password"
                placeholder="Repeat your password"
                required
              />
            </div>

            <div class="herocta mt12">
              <button class="btn primary" type="submit">Create account</button>
            </div>
          </form>

          <p id="authmessage" class="help mt12" aria-live="polite"></p>
        </div>
      </div>
    </div>

    <script src="./assets/js/main.js" defer></script>
    <script src="./assets/js/events.js" defer></script>
  </body>
</html>
